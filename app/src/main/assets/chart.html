<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1A1C20; overflow: hidden; }
    #chart { width: 100%; height: 100%; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #9A9DA3; font-family: sans-serif; font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="chart"></div>
  <div id="loading">Memuat grafik...</div>

  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    var chart = null;
    var candleSeries = null;
    var priceLineRef = null;
    var entryLineRef = null;
    var lastCandleTime = null;
    var tradeMarkers = [];

    function initTVChart() {
      if (chart) return;

      chart = LightweightCharts.createChart(document.getElementById('chart'), {
        width: window.innerWidth,
        height: window.innerHeight,
        layout: {
          background: { type: 'solid', color: '#1A1C20' },
          textColor: '#9A9DA3',
          fontSize: 11,
        },
        grid: {
          vertLines: { color: '#232527', style: 1 },
          horzLines: { color: '#232527', style: 1 },
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
          vertLine: { color: '#4A4D55', labelBackgroundColor: '#2A2B30' },
          horzLine: { color: '#4A4D55', labelBackgroundColor: '#2A2B30' },
        },
        rightPriceScale: {
          borderColor: '#2A2B30',
          textColor: '#9A9DA3',
        },
        timeScale: {
          borderColor: '#2A2B30',
          textColor: '#9A9DA3',
          timeVisible: true,
          secondsVisible: false,
          rightOffset: 5,
        },
        handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
        handleScale: { axisPressedMouseMove: true, pinch: true, mouseWheel: true },
      });

      candleSeries = chart.addCandlestickSeries({
        upColor:         '#36E07A',
        downColor:       '#FF5D5D',
        borderUpColor:   '#36E07A',
        borderDownColor: '#FF5D5D',
        wickUpColor:     '#36E07A',
        wickDownColor:   '#FF5D5D',
      });

      window.addEventListener('resize', function() {
        chart.applyOptions({ width: window.innerWidth, height: window.innerHeight });
      });
    }

    // Called from Java: init chart with full historical candle array
    // format per candle: [timestamp_ms, open, high, low, close]
    window.initChart = function(jsonData) {
      try {
        initTVChart();
        document.getElementById('loading').style.display = 'none';
        var raw = JSON.parse(jsonData);
        var tvData = raw
          .filter(function(c) { return c.length >= 5; })
          .map(function(c) {
            return { time: Math.floor(c[0] / 1000), open: c[1], high: c[2], low: c[3], close: c[4] };
          });
        // dedupe by time (TradingView requires strictly ascending time)
        var seen = {};
        var deduped = [];
        for (var i = 0; i < tvData.length; i++) {
          if (!seen[tvData[i].time]) {
            seen[tvData[i].time] = true;
            deduped.push(tvData[i]);
          }
        }
        if (entryLineRef && candleSeries) { try { candleSeries.removePriceLine(entryLineRef); } catch(e) {} entryLineRef = null; }
        candleSeries.setData(deduped);
        priceLineRef = null;
        tradeMarkers = [];
        if (deduped.length > 0) lastCandleTime = deduped[deduped.length - 1].time;
        chart.timeScale().fitContent();
      } catch(e) { console.error('initChart error', e); }
    };

    // Called from Java: update or add the last (live) candle
    // format: [timestamp_ms, open, high, low, close]
    window.updateLastCandle = function(jsonCandle) {
      try {
        if (!candleSeries) return;
        var c = JSON.parse(jsonCandle);
        if (c.length < 5) return;
        var t = Math.floor(c[0] / 1000);
        lastCandleTime = t;
        candleSeries.update({ time: t, open: c[1], high: c[2], low: c[3], close: c[4] });
      } catch(e) {}
    };

    // Called from Java: draw horizontal entry price line — direction: 'UP' or 'DOWN'
    window.setEntryLine = function(price, direction) {
      try {
        if (!candleSeries) return;
        if (entryLineRef) { candleSeries.removePriceLine(entryLineRef); entryLineRef = null; }
        var isUp = direction === 'UP';
        entryLineRef = candleSeries.createPriceLine({
          price: price,
          color: isUp ? '#36E07A' : '#FF5D5D',
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Solid,
          axisLabelVisible: true,
          title: 'Entry',
        });
      } catch(e) {}
    };

    window.clearEntryLine = function() {
      try {
        if (candleSeries && entryLineRef) { candleSeries.removePriceLine(entryLineRef); entryLineRef = null; }
      } catch(e) {}
    };

    // Called from Java: place arrow marker on latest candle — direction: 'UP' or 'DOWN'
    window.setTradeMarker = function(direction) {
      try {
        if (!candleSeries || !lastCandleTime) return;
        var isUp = direction === 'UP';
        tradeMarkers.push({
          time: lastCandleTime,
          position: isUp ? 'belowBar' : 'aboveBar',
          color: isUp ? '#36E07A' : '#FF5D5D',
          shape: isUp ? 'arrowUp' : 'arrowDown',
          text: '',
        });
        candleSeries.setMarkers(tradeMarkers);
      } catch(e) {}
    };

    // Called from Java: show dashed current-price line
    window.setCurrentPrice = function(price) {
      try {
        if (!candleSeries) return;
        if (priceLineRef) {
          candleSeries.removePriceLine(priceLineRef);
          priceLineRef = null;
        }
        priceLineRef = candleSeries.createPriceLine({
          price: price,
          color: '#9A9DA3',
          lineWidth: 1,
          lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: true,
          title: '',
        });
      } catch(e) {}
    };
  </script>
</body>
</html>
